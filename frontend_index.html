<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>BookSense · Recommendations</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #050608;
        --bg-elevated: #101118;
        --bg-soft: #181a23;
        --accent: #9b5cff;
        --accent-soft: rgba(155, 92, 255, 0.16);
        --accent-strong: #e9d5ff;
        --text: #f5f5fb;
        --muted: #9ca3af;
        --danger: #f97373;
        --radius-lg: 18px;
        --radius-full: 999px;
        --shadow-soft: 0 18px 60px rgba(0, 0, 0, 0.6);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Inter", system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        background: radial-gradient(circle at top, #111827 0, #050608 55%);
        color: var(--text);
        -webkit-font-smoothing: antialiased;
      }

      .page {
        max-width: 1100px;
        margin: 0 auto;
        padding: 24px 16px 40px;
      }

      @media (min-width: 720px) {
        .page {
          padding: 32px 24px 56px;
        }
      }

      .header {
        display: flex;
        align-items: center;
        justify-content: center;
        margin-bottom: 32px;
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 14px;
      }

      .brand-mark {
        width: 40px;
        height: 40px;
        border-radius: 18px;
        background: radial-gradient(circle at 30% 20%, #f97316, #9b5cff);
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 700;
        letter-spacing: 0.04em;
        color: #0b0b0f;
        box-shadow: 0 14px 40px rgba(0, 0, 0, 0.7);
      }

      .brand-text h1 {
        font-family: "Playfair Display", "Times New Roman", serif;
        font-weight: 600;
        font-size: 1.6rem;
        letter-spacing: 0.06em;
        margin: 0 0 4px;
      }

      .brand-text p {
        margin: 0;
        font-size: 0.9rem;
        color: var(--muted);
      }

      .main {
        display: grid;
        gap: 22px;
      }

      @media (min-width: 880px) {
        .main {
          grid-template-columns: minmax(0, 1.2fr) minmax(0, 1.5fr);
          align-items: flex-start;
        }
      }

      .panel {
        background: linear-gradient(
            135deg,
            rgba(243, 244, 246, 0.04),
            transparent
          ),
          var(--bg-elevated);
        border-radius: 22px;
        padding: 22px 20px 20px;
        box-shadow: var(--shadow-soft);
        border: 1px solid rgba(148, 163, 184, 0.22);
      }

      @media (min-width: 720px) {
        .panel {
          padding: 26px 24px 22px;
        }
      }

      .panel h2 {
        font-family: "Playfair Display", "Times New Roman", serif;
        font-weight: 600;
        margin: 0 0 8px;
        font-size: 1.4rem;
      }

      .panel-sub {
        margin: 0 0 18px;
        font-size: 0.9rem;
        color: var(--muted);
      }

      .form {
        display: flex;
        flex-direction: column;
        gap: 14px;
      }

      .field {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }

      .field-label {
        font-size: 0.85rem;
        color: var(--muted);
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        letter-spacing: 0.03em;
        text-transform: uppercase;
      }

      .field-label span {
        color: var(--accent-strong);
      }

      input[type="text"] {
        width: 100%;
        border-radius: var(--radius-lg);
        border: 1px solid rgba(148, 163, 184, 0.4);
        padding: 10px 12px;
        font-size: 0.96rem;
        background: rgba(15, 23, 42, 0.8);
        color: var(--text);
        outline: none;
        transition: border-color 0.15s ease, box-shadow 0.15s ease,
          background 0.15s ease;
      }

      input[type="text"]::placeholder {
        color: rgba(148, 163, 184, 0.7);
      }

      input[type="text"]:focus {
        border-color: var(--accent);
        box-shadow: 0 0 0 1px rgba(155, 92, 255, 0.5);
        background: rgba(15, 23, 42, 0.95);
      }

      input[type="range"] {
        width: 100%;
        accent-color: var(--accent);
      }

      .primary-btn {
        margin-top: 4px;
        border: none;
        border-radius: var(--radius-full);
        padding: 10px 16px;
        font-size: 0.96rem;
        font-weight: 500;
        background: radial-gradient(circle at 20% 0, #f97316, #9b5cff);
        color: #0f172a;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        box-shadow: 0 12px 35px rgba(15, 23, 42, 0.85);
        transition: transform 0.12s ease, box-shadow 0.12s ease,
          filter 0.15s ease;
      }

      .primary-btn:hover {
        transform: translateY(-1px);
        filter: brightness(1.05);
        box-shadow: 0 18px 45px rgba(15, 23, 42, 0.9);
      }

      .primary-btn:active {
        transform: translateY(0);
        box-shadow: 0 10px 28px rgba(15, 23, 42, 0.9);
      }

      .status {
        min-height: 18px;
        margin: 4px 4px 0;
        font-size: 0.82rem;
        color: var(--muted);
      }

      .suggestions {
        position: relative;
      }

      .suggestions-list {
        position: absolute;
        top: 100%;
        left: 0;
        right: 0;
        margin-top: 4px;
        padding: 4px 0;
        background: #050714;
        border-radius: 14px;
        border: 1px solid rgba(148, 163, 184, 0.5);
        box-shadow: 0 18px 45px rgba(15, 23, 42, 0.95);
        max-height: 220px;
        overflow-y: auto;
        z-index: 20;
      }

      .suggestion-item {
        padding: 6px 11px;
        font-size: 0.9rem;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
      }

      .suggestion-item span {
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .suggestion-item small {
        font-size: 0.68rem;
        text-transform: uppercase;
        letter-spacing: 0.18em;
        color: rgba(156, 163, 175, 0.9);
      }

      .suggestion-item:hover {
        background: rgba(15, 23, 42, 0.95);
      }

      .results-section {
        background: radial-gradient(circle at 0% 0%, rgba(155, 92, 255, 0.1), transparent),
          var(--bg-soft);
        border-radius: 22px;
        padding: 18px 16px 16px;
        border: 1px solid rgba(55, 65, 81, 0.9);
        box-shadow: 0 16px 50px rgba(0, 0, 0, 0.7);
      }

      @media (min-width: 720px) {
        .results-section {
          padding: 20px 20px 18px;
        }
      }

      .results-columns {
        display: grid;
        gap: 14px;
      }

      @media (min-width: 720px) {
        .results-columns {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
      }

      .results-group-title {
        margin: 2px 0 6px;
        font-size: 0.8rem;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: rgba(156, 163, 175, 0.9);
      }

      .results-title {
        margin: 0 0 10px;
        font-family: "Playfair Display", "Times New Roman", serif;
        font-weight: 500;
        font-size: 1.2rem;
      }

      .results-grid {
        display: grid;
        grid-template-columns: minmax(0, 1fr);
        gap: 10px;
      }

      @media (min-width: 640px) {
        .results-grid {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
      }

      .card {
        position: relative;
        padding: 12px 12px 11px;
        border-radius: 18px;
        background: linear-gradient(
              135deg,
              rgba(248, 250, 252, 0.02),
              transparent
            ),
          #050714;
        border: 1px solid rgba(148, 163, 184, 0.4);
        box-shadow: 0 10px 26px rgba(15, 23, 42, 0.9);
        overflow: hidden;
      }

      .card::before {
        content: "";
        position: absolute;
        inset: 0;
        background: radial-gradient(
          circle at 0% 0%,
          rgba(155, 92, 255, 0.3),
          transparent 55%
        );
        opacity: 0;
        transition: opacity 0.2s ease;
        pointer-events: none;
      }

      .card:hover::before {
        opacity: 1;
      }

      .card-rank {
        position: absolute;
        top: 8px;
        right: 9px;
        font-size: 0.7rem;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: rgba(209, 213, 219, 0.75);
      }

      .card-title {
        margin: 4px 0 4px;
        font-family: "Playfair Display", "Times New Roman", serif;
        font-size: 1rem;
        font-weight: 600;
      }

      .card-author {
        margin: 0;
        font-size: 0.86rem;
        color: var(--accent-strong);
      }

      .footer {
        margin-top: 26px;
        text-align: center;
        font-size: 0.8rem;
        color: rgba(148, 163, 184, 0.8);
      }
    </style>
  </head>
  <body>
    <div class="page">
      <header class="header">
        <div class="brand">
          <div class="brand-mark">B</div>
          <div class="brand-text">
            <h1>BookSense</h1>
            <p>Discover your next favourite book.</p>
          </div>
        </div>
      </header>

      <main class="main">
        <section class="panel">
          <h2>Find similar books</h2>
          <p class="panel-sub">
            Type an exact title from your library dataset to see smart
            content‑based recommendations.
          </p>

          <form id="search-form" class="form">
            <label class="field">
              <span class="field-label">Book title</span>
              <div class="suggestions">
                <input
                  id="title-input"
                  type="text"
                  placeholder="e.g. The Fault in Our Stars"
                  autocomplete="off"
                  required
                />
                <div
                  id="suggestions-list"
                  class="suggestions-list"
                  style="display: none"
                ></div>
              </div>
            </label>

            <label class="field">
              <span class="field-label">
                Number of recommendations
                <span id="count-value">5</span>
              </span>
              <input
                id="count-input"
                type="range"
                min="1"
                max="10"
                value="5"
              />
            </label>

            <button id="recommend-btn" type="submit" class="primary-btn">
              Get recommendations
            </button>

            <p id="status" class="status" aria-live="polite"></p>
          </form>
        </section>

        <section class="results-section">
          <h3 class="results-title">Recommended for you</h3>
          <div class="results-columns">
            <div>
              <div class="results-group-title">Content-based</div>
              <div id="results-content" class="results-grid"></div>
            </div>
            <div>
              <div class="results-group-title">Collaborative</div>
              <div id="results-collab" class="results-grid"></div>
            </div>
          </div>
        </section>
      </main>

      <footer class="footer">
        <span>Powered by your book recommendation model.</span>
      </footer>
    </div>

    <script>
      const API_URL = "http://127.0.0.1:8000/recommend";
      const TITLES_URL = "http://127.0.0.1:8000/titles";

      const form = document.getElementById("search-form");
      const titleInput = document.getElementById("title-input");
      const countInput = document.getElementById("count-input");
      const countValue = document.getElementById("count-value");
      const statusEl = document.getElementById("status");
      const recommendBtn = document.getElementById("recommend-btn");
      const resultsContentEl = document.getElementById("results-content");
      const resultsCollabEl = document.getElementById("results-collab");
      const suggestionsList = document.getElementById("suggestions-list");

      countInput.addEventListener("input", () => {
        countValue.textContent = countInput.value;
      });

      async function checkBackendHealth() {
        try {
          const res = await fetch("http://127.0.0.1:8000/health");
          if (!res.ok) throw new Error("bad status");
          const data = await res.json();
          if (!data.ready) {
            recommendBtn.disabled = true;
            recommendBtn.style.opacity = "0.7";
            recommendBtn.style.cursor = "not-allowed";
            statusEl.textContent = "Backend connected · Model loading…";
            return false;
          }
          recommendBtn.disabled = false;
          recommendBtn.style.opacity = "";
          recommendBtn.style.cursor = "";
          if (!statusEl.textContent) statusEl.textContent = "Backend connected.";
          return true;
        } catch {
          recommendBtn.disabled = true;
          recommendBtn.style.opacity = "0.7";
          recommendBtn.style.cursor = "not-allowed";
          statusEl.textContent =
            "Backend connection failed. Make sure the server is running on 127.0.0.1:8000.";
          return false;
        }
      }

      // On load, keep checking until ready
      (async () => {
        for (let i = 0; i < 60; i++) {
          const ready = await checkBackendHealth();
          if (ready) break;
          await new Promise((r) => setTimeout(r, 1500));
        }
      })();

      function clearSuggestions() {
        suggestionsList.innerHTML = "";
        suggestionsList.style.display = "none";
      }

      function showSuggestions(titles) {
        if (!titles.length) {
          clearSuggestions();
          return;
        }
        suggestionsList.innerHTML = "";
        titles.forEach((t) => {
          const item = document.createElement("div");
          item.className = "suggestion-item";
          item.innerHTML = `<span title="${t}">${t}</span><small>title</small>`;
          item.addEventListener("click", () => {
            titleInput.value = t;
            clearSuggestions();
          });
          suggestionsList.appendChild(item);
        });
        suggestionsList.style.display = "block";
      }

      let suggestTimeout;
      titleInput.addEventListener("input", async () => {
        const q = titleInput.value.trim();
        if (!q) {
          clearSuggestions();
          return;
        }
        window.clearTimeout(suggestTimeout);
        suggestTimeout = window.setTimeout(async () => {
          try {
            const res = await fetch(
              `${TITLES_URL}?q=${encodeURIComponent(q)}&limit=8`
            );
            if (!res.ok) {
              clearSuggestions();
              return;
            }
            const titles = await res.json();
            showSuggestions(titles);
          } catch {
            clearSuggestions();
          }
        }, 160);
      });

      document.addEventListener("click", (e) => {
        if (!e.target.closest(".suggestions")) {
          clearSuggestions();
        }
      });

      form.addEventListener("submit", async (e) => {
        e.preventDefault();
        const ok = await checkBackendHealth();
        if (!ok) return;
        const title = titleInput.value.trim();
        const n = parseInt(countInput.value, 10);

        if (!title) {
          statusEl.textContent = "Please enter a book title.";
          return;
        }

        statusEl.textContent = "Searching recommendations…";
        resultsContentEl.innerHTML = "";
        resultsCollabEl.innerHTML = "";
        clearSuggestions();

        try {
          const res = await fetch(API_URL, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ title, n }),
          });

          if (!res.ok) {
            if (res.status === 404) {
              statusEl.textContent =
                "That title was not found in the dataset. Please try another exact title.";
            } else {
              statusEl.textContent =
                "Something went wrong while fetching recommendations.";
            }
            return;
          }

          const data = await res.json();

          const content = Array.isArray(data.content_based)
            ? data.content_based
            : [];
          const collab = Array.isArray(data.collaborative)
            ? data.collaborative
            : [];

          statusEl.textContent = [
            content.length
              ? `${content.length} content-based`
              : "0 content-based",
            collab.length
              ? `${collab.length} collaborative`
              : "0 collaborative",
          ].join(" · ");

          resultsContentEl.innerHTML = "";
          resultsCollabEl.innerHTML = "";

          content.forEach((book, index) => {
            const card = document.createElement("article");
            card.className = "card";
            card.innerHTML = `
              <div class="card-rank">#${index + 1}</div>
              <h4 class="card-title">${book.title}</h4>
              <p class="card-author">${book.authors}</p>
            `;
            resultsContentEl.appendChild(card);
          });

          collab.forEach((book, index) => {
            const card = document.createElement("article");
            card.className = "card";
            card.innerHTML = `
              <div class="card-rank">#${index + 1}</div>
              <h4 class="card-title">${book.title}</h4>
              <p class="card-author">${book.authors}</p>
            `;
            resultsCollabEl.appendChild(card);
          });
        } catch (err) {
          console.error(err);
          statusEl.textContent =
            "Unable to reach the API. Make sure the backend is running on port 8000.";
        }
      });
    </script>
  </body>
</html>
